version: '3.8'

services:
  vault:
    image: hashicorp/vault:1.15
    container_name: wallet-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - wallet-network

networks:
  wallet-network:
    external: true
    name: wallet-microservices_default
